apiVersion: milvus.io/v1beta1
kind: Milvus
metadata:
  name: my-release
  labels:
    app: milvus
spec:
  mode: cluster
  components:
    mixCoord:
      replicas: 1
      resources:
        limits:
          cpu: 2
          memory: 8Gi
      nodeSelector:
        milvus/role: misc
    streamingNode:
      replicas: 1
      resources:
        limits:
          cpu: 2
          memory: 8Gi
      nodeSelector:
        milvus/role: misc
    proxy:
      replicas: 1
      resources:
        limits:
          cpu: 2
          memory: 8Gi
      nodeSelector:
        milvus/role: misc
    queryNode:
      replicas: 3
      resources:
        limits:
          cpu: 4
          memory: 16Gi
      nodeSelector:
        milvus/role: querynode
    dataNode:
      replicas: 2
      resources:
        limits:
          cpu: 4
          memory: 16Gi
      nodeSelector:
        milvus/role: misc
  config: {}
  dependencies:
    msgStreamType: woodpecker
    etcd:
      inCluster:
        values:
          autoCompactionMode: revision
          autoCompactionRetention: "1000"
          extraEnvVars:
          - name: ETCD_QUOTA_BACKEND_BYTES
            value: "4294967296"
          - name: ETCD_HEARTBEAT_INTERVAL
            value: "500"
          - name: ETCD_ELECTION_TIMEOUT
            value: "25000"
          - name: ETCD_SNAPSHOT_COUNT
            value: "10000"
          - name: ETCD_ENABLE_PPROF
            value: "true"
          persistence:
            accessMode: ReadWriteOnce
            enabled: true
            size: 20Gi
            storageClass:
          replicaCount: 3
          resources:
            limits:
              cpu: 1
              memory: 4Gi
            requests:
              cpu: 1
              memory: 4Gi
          nodeSelector:
            milvus/role: etcd
    storage:
      inCluster:
        values:
          mode: distributed
          resources:
            limits:
              cpu: 1
              memory: 8Gi
          persistence:
            storageClass:
            accessMode: ReadWriteOnce
            size: 144Gi
          nodeSelector:
            milvus/role: minio
